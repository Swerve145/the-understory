<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Understory</title>
    <style>
        /* =========================================
           1. TYPOGRAPHY & VARIABLES
           ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap');

        :root {
            --bg-dark: #010402;
            --text-main: #e8f4ec;
            --text-muted: #6b8274;
            --accent: #8fbfaa;
            --accent-glow: rgba(143, 191, 170, 0.4);
            --ui-border: rgba(116, 140, 126, 0.15);
            --ui-bg-hover: rgba(143, 191, 170, 0.05);
            --transition-slow: 2s cubic-bezier(0.25, 1, 0.5, 1);
            --transition-med: 0.8s ease;
        }

        /* =========================================
           2. BASE STYLES & RESET
           ========================================= */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        /* =========================================
           3. BACKGROUND & ATMOSPHERE
           ========================================= */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 40;
            background: radial-gradient(circle at center, transparent 40%, rgba(1, 4, 2, 0.9) 100%);
        }

        #bg-glow {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 110%, rgba(13, 41, 25, 0.4) 0%, rgba(1, 4, 2, 1) 90%);
            z-index: 0;
            transition: background 3s ease;
        }

        /* =========================================
           4. PARTICLE ENGINE (SPORES)
           ========================================= */
        #spores-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .spore {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            filter: blur(4px);
            opacity: 0;
            transition: background 2s ease;
        }

        @keyframes float-up {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) translateX(50px) rotate(360deg); opacity: 0; }
        }

        @keyframes float-pulse {
            0% { transform: scale(0.8); opacity: 0.3; }
            100% { transform: scale(1.4); opacity: 0.7; }
        }

        /* =========================================
           5. LAYOUT & CONTAINERS
           ========================================= */
        #main-layout {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1000px;
            height: 85vh;
            padding: 0 40px;
            gap: 60px;
        }

        #reader-pane {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            max-width: 650px;
        }

        #sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 10vh;
            opacity: 0;
            transition: opacity var(--transition-med);
        }

        #sidebar.visible {
            opacity: 1;
        }

        /* =========================================
           6. TYPOGRAPHY & TEXT ELEMENTS
           ========================================= */
        #audio-prompt {
            position: absolute;
            top: 5vh;
            width: 100%;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            animation: breathe 4s infinite alternate;
            z-index: 20;
        }

        @keyframes breathe {
            0% { opacity: 0.2; }
            100% { opacity: 0.6; }
        }

        #scene-title {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        #scene-title.visible {
            opacity: 0.7;
            transform: translateY(0);
        }

        #text-container {
            font-size: 1.6rem;
            line-height: 1.7;
            margin-bottom: 60px;
            min-height: 250px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .story-paragraph {
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .story-paragraph.visible {
            opacity: 1;
        }

        .story-paragraph.fade-out {
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        em {
            color: var(--accent);
            font-style: italic;
            opacity: 0.95;
        }

        .inner-thought {
            font-size: 1.3rem;
            color: var(--text-muted);
            font-style: italic;
            padding-left: 20px;
            border-left: 2px solid var(--ui-border);
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--accent);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { background: transparent; }
        }

        /* Final hidden message */
        .final-message {
            font-size: 1rem;
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            margin-top: 40px;
            opacity: 0;
            transition: opacity 2.5s ease;
        }
        .final-message.visible {
            opacity: 0.5;
        }

        /* =========================================
           7. INTERACTIVE UI (BUTTONS)
           ========================================= */
        #choices-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        #choices-container.visible {
            opacity: 1;
            pointer-events: all;
        }

        button {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--ui-border);
            padding: 18px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-align: left;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 0%; height: 100%;
            background: var(--ui-bg-hover);
            transition: width 0.4s ease;
            z-index: 0;
        }

        button:hover::before {
            width: 100%;
        }

        button:hover {
            color: var(--text-main);
            border-color: var(--accent);
            transform: translateX(8px);
            box-shadow: 0 4px 20px rgba(143, 191, 170, 0.1);
        }

        button span {
            position: relative;
            z-index: 1;
        }

        .btn-examine {
            border-style: dashed;
        }

        /* =========================================
           8. INVENTORY / MEMORY SYSTEM
           ========================================= */
        .sidebar-title {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--ui-border);
            padding-bottom: 10px;
        }

        #memory-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            list-style: none;
        }

        .memory-item {
            font-size: 1.1rem;
            color: var(--accent);
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 1s ease, transform 1s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .memory-item.visible {
            opacity: 0.8;
            transform: translateX(0);
        }

        .memory-item::before {
            content: '✦';
            font-size: 0.8rem;
            color: var(--text-muted);
        }

    </style>
</head>
<body>

    <div class="noise"></div>
    <div class="vignette"></div>
    <div id="bg-glow"></div>
    <div id="spores-container"></div>
    
    <div id="audio-prompt">Audio required. Take your time.</div>

    <div id="main-layout">
        <div id="reader-pane">
            <div id="scene-title"></div>
            <div id="text-container"></div>
            <div id="choices-container"></div>
        </div>

        <div id="sidebar">
            <div class="sidebar-title">Field Notes</div>
            <ul id="memory-list"></ul>
        </div>
    </div>

    <script>
        /* =========================================
           1. AUDIO ENGINE — sparse, atmospheric
           ========================================= */
        const AudioEngine = (function() {
            let ctx = null;
            let masterGain = null;
            let droneOsc = null;

            function init() {
                if (ctx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                ctx = new AudioContext();
                
                masterGain = ctx.createGain();
                masterGain.connect(ctx.destination);
                masterGain.gain.value = 0;
                masterGain.gain.setTargetAtTime(0.22, ctx.currentTime, 5);

                startDrone();
                scheduleAmbientEvents();
            }

            function startDrone() {
                droneOsc = ctx.createOscillator();
                droneOsc.type = 'sine';
                droneOsc.frequency.value = 55;
                
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.01;

                const droneGain = ctx.createGain();
                droneGain.gain.value = 0.08;
                lfo.connect(droneGain.gain);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 90;

                droneOsc.connect(filter);
                filter.connect(droneGain);
                droneGain.connect(masterGain);

                droneOsc.start();
                lfo.start();
            }

            function scheduleAmbientEvents() {
                const types = ['wind', 'wind', 'chime', 'drip', 'drip', 'drip'];
                function scheduleNext() {
                    const type = types[Math.floor(Math.random() * types.length)];
                    const intervals = { wind: 22000, chime: 50000, drip: 10000 };
                    const base = intervals[type] || 5000;
                    const delay = base + Math.random() * base * 0.7;
                    setTimeout(() => {
                        if (type === 'wind') playWind();
                        else if (type === 'chime') playChime();
                        else if (type === 'drip') playDrip();
                        scheduleNext();
                    }, delay);
                }
                scheduleNext();
            }

            function playWind() {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100 + Math.random() * 60, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.012, ctx.currentTime + 2);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 7);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                osc.stop(ctx.currentTime + 7);
            }

            function playChime() {
                const freq = [261.63, 311.13, 392.00][Math.floor(Math.random() * 3)];
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 0.6);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 8);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                osc.stop(ctx.currentTime + 8);
            }

            function playDrip() {
                const bufferSize = Math.floor(ctx.sampleRate * 0.25);
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 5);
                }
                const source = ctx.createBufferSource();
                source.buffer = buffer;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.025, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
                source.connect(gain);
                gain.connect(masterGain);
                source.start();
                source.stop(ctx.currentTime + 0.35);
            }

            function playClickSound() {
                if (!ctx) return;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(55, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.03, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                osc.stop(ctx.currentTime + 0.25);
            }

            function shiftMood(mood) {
                if (!droneOsc) return;
                const freqMap = { dark: 46.25, light: 61.74, default: 55 };
                droneOsc.frequency.setTargetAtTime(freqMap[mood] || 55, ctx.currentTime, 4);
            }

            return { init, playClickSound, shiftMood };
        })();

        /* =========================================
           2. VISUAL ENGINE
           ========================================= */
        function initVisuals() {
            const container = document.getElementById('spores-container');
            const spores = [];
            for (let i = 0; i < 40; i++) {
                const spore = document.createElement('div');
                spore.classList.add('spore');
                const size = Math.random() * 2.5 + 1;
                spore.style.width = `${size}px`;
                spore.style.height = `${size}px`;
                spore.style.left = `${Math.random() * 100}vw`;
                const floatDur = Math.random() * 35 + 25;
                const pulseDur = Math.random() * 4 + 3;
                const delay = Math.random() * -50;
                spore.style.animation = `float-up ${floatDur}s linear infinite ${delay}s, float-pulse ${pulseDur}s ease-in-out infinite alternate ${delay}s`;
                container.appendChild(spore);
                spores.push({ el: spore, baseX: parseFloat(spore.style.left), sensitivity: 0.4 + Math.random() * 0.6 });
            }

            document.addEventListener('mousemove', (e) => {
                const xRatio = e.clientX / window.innerWidth;
                const yRatio = e.clientY / window.innerHeight;
                spores.forEach(sp => {
                    const offsetX = (xRatio - 0.5) * 12 * sp.sensitivity;
                    sp.el.style.transform = `translateX(${offsetX}px)`;
                });
                const bg = document.getElementById('bg-glow');
                bg.style.backgroundPosition = `${xRatio * 100}% ${yRatio * 100}%`;
            });
        }

        /* =========================================
           3. TYPEWRITER ENGINE
           ========================================= */
        function typeNode(element, htmlString, speed = 25, callback) {
            const tokens = htmlString.match(/(<[^>]*>|[^<]+)/g) || [];
            let currentIndex = 0;
            let charIndex = 0;
            element.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'typewriter-cursor';
            element.appendChild(cursor);

            function step() {
                if (currentIndex >= tokens.length) {
                    cursor.remove();
                    if (callback) callback();
                    return;
                }
                const token = tokens[currentIndex];
                if (token.startsWith('<')) {
                    element.insertAdjacentHTML('beforeend', token);
                    currentIndex++;
                    step();
                } else {
                    if (charIndex < token.length) {
                        element.insertAdjacentHTML('beforeend', token.charAt(charIndex));
                        charIndex++;
                        setTimeout(step, speed);
                    } else {
                        charIndex = 0;
                        currentIndex++;
                        step();
                    }
                }
            }
            step();
        }

        /* =========================================
           4. GAME STATE & NARRATIVE
           ========================================= */
        const gameState = {
            currentNode: 'start',
            memories: [],
            flags: {
                examinedMicroscope: false,
                examinedNectar: false,
                mothHelped: false,
                flytrapHealed: false,
                beetleMet: false,
                satDown: false,
                lookedAround: false
            }
        };

        const storyNodes = {
            start: {
                title: "02:14 AM",
                bgGradient: "radial-gradient(circle at 50% 110%, rgba(20, 30, 25, 0.4) 0%, rgba(1, 4, 2, 1) 90%)",
                mood: "default",
                content: [
                    "You've been staring at cells for eleven hours. This is normal for you. You're not sure if that's a good thing.",
                    "The tape holding the lamp together is coming unstuck again. A red-and-white corner of something — a ticket stub, maybe — is wedged under the microscope for balance. Your watch slides halfway down your arm when you lean forward. You still haven't got round to fixing the strap.",
                    "Beneath a stack of lab notes: Darwin's <em>Insectivorous Plants</em>, spine cracked open at page 87, and a copy of <em>The Atlas Six</em> face-down, halfway through. Someone left a mug ring on the cover. You weren't that someone, but you still feel guilty about it."
                ],
                choices: [
                    { 
                        text: "Peer into the microscope.", 
                        target: "microscope",
                        type: "examine"
                    },
                    { 
                        text: "Reach across for the pipette.", 
                        target: "the_fall"
                    }
                ]
            },
            microscope: {
                title: "Under the lens",
                bgGradient: "radial-gradient(circle at 50% 110%, rgba(20, 30, 25, 0.4) 0%, rgba(1, 4, 2, 1) 90%)",
                mood: "default",
                content: [
                    "Cell walls slide into focus. Frantic, organised, completely unaware a giant is watching.",
                    "<span class='inner-thought'>It must be nice, having walls that thick.</span>"
                ],
                choices: [
                    { 
                        text: "Step back from the eyepiece.", 
                        target: "start",
                        action: () => gameState.flags.examinedMicroscope = true
                    }
                ]
            },
            the_fall: {
                title: "Terminal velocity",
                bgGradient: "radial-gradient(circle at 50% 110%, rgba(5, 15, 20, 0.6) 0%, rgba(1, 4, 2, 1) 100%)",
                mood: "dark",
                content: [
                    "Your sleeve catches the tape. You lurch forward. For one stupid, entirely avoidable second, you're airborne.",
                    "The room doesn't just tilt. It fractures. The lamp becomes a burning sun. The floor rushes up — or you rush down. Hard to tell. You're shrinking into the space between things.",
                    "Someone once told you you move too fast. They weren't wrong."
                ],
                choices: [
                    { text: "Brace for impact.", target: "adrift" }
                ]
            },
            adrift: {
                title: "The nectar sea",
                bgGradient: "radial-gradient(circle at 50% 110%, rgba(30, 20, 10, 0.4) 0%, rgba(1, 4, 2, 1) 90%)",
                mood: "default",
                content: [
                    "You open your eyes. You're maybe four millimetres tall. Perspective is hard when everything is a hundred times larger than it should be.",
                    "The surface beneath you gives slightly. Sticky. Amber. Digestive enzymes.",
                    "Oh.",
                    "<span class='inner-thought'>You've read about this exact scenario. Darwin would have had opinions.</span>"
                ],
                choices: [
                    { 
                        text: "Dip your fingers in the fluid.", 
                        target: "examine_nectar",
                        type: "examine",
                        condition: () => !gameState.flags.examinedNectar 
                    },
                    { text: "Grab the piece of fibre floating nearby.", target: "raft" }
                ]
            },
            examine_nectar: {
                title: "Acid test",
                bgGradient: "radial-gradient(circle at 50% 110%, rgba(40, 25, 10, 0.5) 0%, rgba(1, 4, 2, 1) 90%)",
                mood: "dark",
                content: [
                    "It stings. Acid phosphatases. Proteases. Pitcher plant. Textbook.",
                    "Fuck."
                ],
                choices: [
                    { 
                        text: "Focus. Survive first, analyse later.", 
                        target: "adrift",
                        action: () => gameState.flags.examinedNectar = true
                    }
                ]
            },
            raft: {
                title: "Fibrous debris",
                bgGradient: "radial-gradient(circle at 50% 110%, rgba(30, 20, 10, 0.4) 0%, rgba(1, 4, 2, 1) 90%)",
                mood: "default",
                content: [
                    "A strip of plant fibre drifts past. You grab it. It's not a life raft. It's already starting to soften in the enzymes.",
                    "You've been in worse situations. Probably. You'll remember one later."
                ],
                choices: [
                    { text: "Paddle toward the solid edge.", target: "shore" }
                ]
            },
            shore: {
                title: "The rim",
                bgGradient: "radial-gradient(circle at 50% 110%, rgba(13, 41, 25, 0.5) 0%, rgba(1, 4, 2, 1) 90%)",
                mood: "light",
                content: [
                    "You haul yourself onto the waxy green cuticle. Solid ground. Relatively speaking.",
                    "It's quiet. It's been quiet this whole time, you realise. The kind of quiet that isn't empty — it's just been going on without you.",
                    "You stand still for a moment. Something moves. You freeze. It isn't an animal. Just a leaf, slowly folding back on itself.",
                    "The air smells like wet leaves and something faintly metallic. Distant chimes. Water dripping somewhere you can't see."
                ],
                choices: [
                    { text: "Look around properly.", target: "look_around", condition: () => !gameState.flags.lookedAround },
                    { text: "Venture forward.", target: "crossroads", action: () => showSidebar() }
                ]
            },
            look_around: {
                title: "Taking it in",
                bgGradient: "radial-gradient(circle at 50% 110%, rgba(13, 41, 25, 0.5) 0%, rgba(1, 4, 2, 1) 90%)",
                mood: "light",
                content: [
                    "You let yourself take it in. The scale of everything. Bioluminescent spores drifting in the air like suspended stars. The distant, blurred glow of your desk lamp — now a kind of moon.",
                    "It's beautiful. It's also a carnivorous plant habitat, which means everything here is trying to eat something. But beautiful nonetheless.",
                    "<span class='inner-thought'>You mentally file this under: worth the inconvenience.</span>"
                ],
                choices: [
                    { 
                        text: "Alright. Move on.", 
                        target: "crossroads", 
                        action: () => {
                            gameState.flags.lookedAround = true;
                            addMemory("A world inside a world. Worth the inconvenience.");
                            showSidebar();
                        }
                    }
                ]
            },
            crossroads: {
                title: "Three ways",
                bgGradient: "radial-gradient(circle at 50% 110%, rgba(13, 41, 25, 0.5) 0%, rgba(1, 4, 2, 1) 90%)",
                mood: "default",
                content: [
                    "Three directions. Left: frantic, uneven fluttering. Centre: a massive leaf blocking the path, swollen and sick-looking. Right: a steady, deliberate <em>tap tap tap</em>.",
                    "And straight up — the stool leg. The only way back. Polished steel. No handholds. You do the maths automatically. It's not possible alone.",
                    "You can feel the responsible-decision part of your brain already spinning up."
                ],
                choices: [
                    { text: "Follow the fluttering sound.", target: "moth_approach", condition: () => !gameState.flags.mothHelped },
                    { text: "Examine the blocked central path.", target: "flytrap_approach", condition: () => !gameState.flags.flytrapHealed },

        /* =========================================
           5. RENDERING & STATE MANAGEMENT
           ========================================= */
        const textContainer = document.getElementById('text-container');
        const choicesContainer = document.getElementById('choices-container');
        const sceneTitle = document.getElementById('scene-title');
        const bgGlow = document.getElementById('bg-glow');
        const audioPrompt = document.getElementById('audio-prompt');
        const sidebar = document.getElementById('sidebar');
        const memoryList = document.getElementById('memory-list');

        let finalMessageTimer = null; // for the hidden ending message

        function addMemory(text) {
            if (gameState.memories.includes(text)) return;
            gameState.memories.push(text);
            const li = document.createElement('li');
            li.className = 'memory-item';
            li.innerText = text;
            memoryList.appendChild(li);
            void li.offsetWidth;
            li.classList.add('visible');
            saveGame();
        }

        function showSidebar() {
            if (!sidebar.classList.contains('visible')) {
                sidebar.classList.add('visible');
            }
        }

        let typewriterActive = false;

        function renderNode(nodeId) {
            if (typewriterActive) return;
            // Clear any pending final message timer
            if (finalMessageTimer) {
                clearTimeout(finalMessageTimer);
                finalMessageTimer = null;
            }

            AudioEngine.init();
            if(audioPrompt) audioPrompt.style.opacity = '0';
            const node = storyNodes[nodeId];
            if (!node) return;
            bgGlow.style.background = node.bgGradient;
            AudioEngine.shiftMood(node.mood);

            sceneTitle.classList.remove('visible');
            choicesContainer.classList.remove('visible');
            const existingParas = document.querySelectorAll('.story-paragraph');
            existingParas.forEach(p => p.classList.add('fade-out'));
            // Remove any old final message
            const oldFinal = document.querySelector('.final-message');
            if (oldFinal) oldFinal.remove();

            setTimeout(() => {
                textContainer.innerHTML = '';
                choicesContainer.innerHTML = '';
                typewriterActive = true;

                sceneTitle.innerText = node.title;
                sceneTitle.classList.add('visible');

                let paraIndex = 0;
                function typeNextParagraph() {
                    if (paraIndex >= node.content.length) {
                        showChoices(node);
                        typewriterActive = false;

                        // If this is the ending, schedule the hidden message
                        if (nodeId === 'ending') {
                            finalMessageTimer = setTimeout(() => {
                                const msg = document.createElement('p');
                                msg.className = 'final-message';
                                // Change the initial below to yours if needed
                                msg.innerHTML = 'Thanks for playing. &mdash; S';
                                textContainer.appendChild(msg);
                                void msg.offsetWidth;
                                msg.classList.add('visible');
                            }, 7000); // appears after 7 seconds of quiet
                        }
                        return;
                    }
                    const p = document.createElement('p');
                    p.className = 'story-paragraph';
                    p.style.opacity = '1';
                    textContainer.appendChild(p);
                    typeNode(p, node.content[paraIndex], 25, () => {
                        paraIndex++;
                        setTimeout(typeNextParagraph, 250);
                    });
                }
                typeNextParagraph();
            }, 800);
        }

        function showChoices(node) {
            node.choices.forEach(choice => {
                if (choice.condition && !choice.condition()) return;
                const btn = document.createElement('button');
                if (choice.type === 'examine') btn.classList.add('btn-examine');
                const span = document.createElement('span');
                span.innerText = choice.text;
                btn.appendChild(span);
                btn.addEventListener('click', () => {
                    AudioEngine.playClickSound();
                    if (choice.action) choice.action();
                    gameState.currentNode = choice.target;
                    saveGame();
                    renderNode(choice.target);
                });
                choicesContainer.appendChild(btn);
            });
            choicesContainer.classList.add('visible');
        }

        /* =========================================
           6. SAVE / LOAD
           ========================================= */
        function saveGame() {
            const state = {
                currentNode: gameState.currentNode,
                flags: gameState.flags,
                memories: gameState.memories
            };
            localStorage.setItem('understory_save', JSON.stringify(state));
        }

        function loadGame() {
            const raw = localStorage.getItem('understory_save');
            if (!raw) return false;
            try {
                const saved = JSON.parse(raw);
                gameState.currentNode = saved.currentNode || 'start';
                gameState.flags = saved.flags || { ...gameState.flags };
                gameState.memories = saved.memories || [];
                gameState.memories.forEach(m => {
                    const li = document.createElement('li');
                    li.className = 'memory-item';
                    li.innerText = m;
                    memoryList.appendChild(li);
                    void li.offsetWidth;
                    li.classList.add('visible');
                });
                if (gameState.memories.length > 0) showSidebar();
                return true;
            } catch(e) {
                return false;
            }
        }

        /* =========================================
           7. INITIALIZATION
           ========================================= */
        window.onload = () => {
            initVisuals();
            const hasSave = loadGame();

            const startBtn = document.createElement('button');
            const span = document.createElement('span');
            span.innerText = hasSave ? "Continue" : "Initialize Simulation";
            startBtn.appendChild(span);
            
            if (hasSave) {
                const newGameBtn = document.createElement('button');
                const nSpan = document.createElement('span');
                nSpan.innerText = "New Game";
                newGameBtn.appendChild(nSpan);
                newGameBtn.addEventListener('click', () => {
                    localStorage.removeItem('understory_save');
                    gameState.currentNode = 'start';
                    gameState.flags = { examinedMicroscope: false, examinedNectar: false, mothHelped: false, flytrapHealed: false, beetleMet: false, satDown: false, lookedAround: false };
                    gameState.memories = [];
                    memoryList.innerHTML = '';
                    sidebar.classList.remove('visible');
                    AudioEngine.init();
                    renderNode('start');
                });
                choicesContainer.appendChild(newGameBtn);
            }

            startBtn.addEventListener('click', () => {
                gameState.currentNode = hasSave ? (gameState.currentNode || 'start') : 'start';
                AudioEngine.init();
                renderNode(gameState.currentNode);
            });

            choicesContainer.appendChild(startBtn);
            setTimeout(() => {
                choicesContainer.classList.add('visible');
            }, 1000);
        };
    </script>
