<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Understory</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400&display=swap');

        :root {
            --bg-base: #040d09;
            --text-main: #e2f0e6;
            --accent: #88c999;
            --glass-bg: rgba(6, 20, 14, 0.45);
            --glass-border: rgba(136, 201, 153, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Lora', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dynamic background that moves with JS */
        #bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 120%, rgba(10, 38, 23, 0.8) 0%, rgba(4, 13, 9, 1) 70%);
            z-index: 0;
            transition: background 0.1s ease-out;
        }

        #spores-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .spore {
            position: absolute;
            background: rgba(180, 255, 200, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(180, 255, 200, 0.9), 0 0 25px rgba(180, 255, 200, 0.3);
            animation: drift linear infinite, pulse ease-in-out infinite alternate;
        }

        @keyframes drift {
            0% { transform: translateY(105vh) translateX(0); opacity: 0; }
            10% { opacity: 0.9; }
            90% { opacity: 0.9; }
            100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
        }

        @keyframes pulse {
            0% { transform: scale(0.7); opacity: 0.6; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        #game-container {
            position: relative;
            z-index: 10;
            max-width: 650px;
            width: 90%;
            padding: 50px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 0 20px rgba(136, 201, 153, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        #text-container {
            font-size: 1.35rem;
            line-height: 1.8;
            margin-bottom: 45px;
            min-height: 160px;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 0.2px;
        }

        .fade-out { opacity: 0 !important; }
        .fade-in { opacity: 1 !important; }

        #choices-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        button {
            background: rgba(136, 201, 153, 0.05);
            color: var(--accent);
            border: 1px solid var(--glass-border);
            padding: 16px 24px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: rgba(136, 201, 153, 0.15);
            border-color: rgba(136, 201, 153, 0.4);
            box-shadow: 0 0 20px rgba(136, 201, 153, 0.15);
            transform: translateX(8px);
            color: #fff;
        }

        #audio-prompt {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: #668c74;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .silhouete {
            position: absolute;
            bottom: -5vh;
            right: -5vw;
            width: 450px;
            height: 450px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23020805" d="M90,100 C90,70 60,40 50,60 C40,75 30,90 10,100 Z"/><path fill="%23030a07" d="M100,100 C100,40 70,20 60,50 C50,75 40,90 30,100 Z"/></svg>') no-repeat;
            background-size: contain;
            opacity: 0.4;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="bg-glow"></div>
    <div id="spores-container"></div>
    <div class="silhouete"></div>

    <div id="game-container">
        <div id="audio-prompt">For the best experience, please use headphones.</div>
        <div id="text-container" style="opacity: 1;"></div>
        <div id="choices-container"></div>
    </div>

    <script>
        // --- PARALLAX MOUSE GLOW ---
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.getElementById('bg-glow').style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(12, 45, 27, 0.8) 0%, rgba(4, 13, 9, 1) 80%)`;
        });

        // --- AMBIENT PROCEDURAL AUDIO ENGINE ---
        let audioCtx;
        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(audioCtx.destination);
            
            masterGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 5);

            const frequencies = [130.81, 196.00, 261.63, 329.63]; 
            
            frequencies.forEach(freq => {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;

                const lfo = audioCtx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.03 + Math.random() * 0.05; 

                const lfoGain = audioCtx.createGain();
                lfoGain.gain.value = 0.4;

                lfo.connect(lfoGain.gain);
                osc.connect(lfoGain);
                lfoGain.connect(masterGain);

                osc.start();
                lfo.start();
            });
        }

        // --- VISUAL PARTICLE ENGINE ---
        function createSpores() {
            const container = document.getElementById('spores-container');
            for (let i = 0; i < 45; i++) {
                const spore = document.createElement('div');
                spore.classList.add('spore');
                const size = Math.random() * 3 + 1.5;
                spore.style.width = `${size}px`;
                spore.style.height = `${size}px`;
                spore.style.left = `${Math.random() * 100}vw`;
                spore.style.animationDuration = `${Math.random() * 20 + 10}s, ${Math.random() * 4 + 2}s`;
                spore.style.animationDelay = `${Math.random() * -20}s, 0s`;
                container.appendChild(spore);
            }
        }
        createSpores();

        // --- GAME STATE & LOGIC ---
        let state = { helpedMoth: false, healedFlytrap: false, metBeetle: false };

        const story = {
            start: {
                text: "It's late. You are moving faster than recommended—a habit that recently cost you a minor on a driving test. Your lab is a masterpiece of over-engineering; a structure that would make the host of Grand Designs weep. On your desk sits a well-worn copy of Darwin's <em>Insectivorous Plants</em> next to <em>The Atlas Six</em>. You lean over the primary sample. You slip. The world rushes up.",
                choices: [
                    { text: "Open your eyes.", target: "adrift" }
                ]
            },
            adrift: {
                text: "You wake up four millimetres tall. You are adrift on a small, fibrous leaf in a vast pool of digestive nectar. It is dangerously beautiful, terrifyingly serene, and decidedly very <em>Life of Pi</em>. Above you looms a lush jungle of giant carnivorous plants.",
                choices: [
                    { text: "Paddle to the edge of the pitcher plant.", target: "edge" }
                ]
            },
            edge: {
                text: "You pull yourself onto the waxy rim. The air glows with bioluminescent spores. From here, three paths weave through the towering, green silhouettes. A faint fluttering comes from the left. A blockage of leaves sits in the middle. A strange tapping echoes from the right.",
                choices: [
                    { text: "Investigate the fluttering (Left Path)", target: "moth", condition: () => !state.helpedMoth },
                    { text: "Inspect the blockage (Middle Path)", target: "flytrap", condition: () => !state.healedFlytrap },
                    { text: "Follow the tapping (Right Path)", target: "beetle", condition: () => !state.metBeetle },
                    { text: "Approach the sheer climb to the lab bench.", target: "climax", condition: () => state.helpedMoth || state.healedFlytrap || state.metBeetle }
                ]
            },
            moth: {
                text: "You find a lunar moth. It is magnificent, but one of its wings is badly torn, grounding it. You look at the fallen structural debris around you. This isn't your usual field, but you've been reading up on prosthetics lately.",
                choices: [
                    { text: "Engineer a tiny prosthetic wing from dried fibers.", target: "moth_help" }
                ]
            },
            moth_help: {
                text: "Working meticulously, you fashion a delicate, functional wing brace. The moth flexes it, tests the aerodynamics, and gives you a look of deep, insectoid gratitude. In return, it nudges a shiny, inexplicably pink, gummy object toward you. Is that... a Percy Pig?",
                choices: [
                    { text: "Pocket the gummy and return to the crossroads.", target: "edge", action: () => state.helpedMoth = true }
                ]
            },
            flytrap: {
                text: "A massive Venus flytrap forms a natural bridge upward, but its jaws are clamped shut. The tissue around its hinges is flushed and discolored. A classic bacterial bloom. Good thing microbiology is exactly what you do.",
                choices: [
                    { text: "Diagnose and clear the bacterial infection.", target: "flytrap_help" }
                ]
            },
            flytrap_help: {
                text: "Using a synthesized alkaline drop from a nearby moss colony, you neutralize the acidic bacterial bloom. The flytrap shudders, exhales a spore-cloud of relief, and opens its jaws wide, clearing the central path.",
                choices: [
                    { text: "Pat the giant leaf and return to the crossroads.", target: "edge", action: () => state.healedFlytrap = true }
                ]
            },
            beetle: {
                text: "Sitting on a pebble is a rhinoceros beetle. It is wearing a tiny, perfectly tailored cape made from a scrap of red and white fabric. If you squint, the fabric looks suspiciously like an Arsenal banner. The beetle exudes a brooding, Lego-Batman kind of energy.",
                choices: [
                    { text: "Compliment the cape.", target: "beetle_help" }
                ]
            },
            beetle_help: {
                text: "You nod respectfully at the cape. The beetle nods back, adjusting it with dramatic flair. A silent, unbreakable bond of respect has been formed. He stands guard, ready.",
                choices: [
                    { text: "Leave the tiny dark knight to his watch.", target: "edge", action: () => state.metBeetle = true }
                ]
            },
            climax: {
                text: "You reach the final ascent. The leg of the lab bench towers into the stratosphere. The polished metal is far too sheer to manage alone. You calculate the physics. It's impossible. For a moment, the heavy quiet of the lab settles over you.",
                choices: [
                    { text: "Look for another way.", target: "climax_resolve" }
                ]
            },
            climax_resolve: {
                text: "Before you can turn back, the air shifts. A shadow falls over you. The lunar moth descends, offering its pristine, engineered wing. The beetle marches out from the undergrowth, ready to give you the initial boost. Above, the healed flytrap lowers a sturdy vine. You aren't doing this alone.",
                choices: [
                    { text: "Let them lift you.", target: "ending" }
                ]
            },
            ending: {
                text: "You are carried up through the glowing atmosphere, back to the precipice of the desk, back to your proper scale. You spend your life holding everyone together. It is nice, for once, to sit back and watch a whole world do it for you.<br><br><span style='font-family: Montserrat, sans-serif; font-size: 0.9rem; color: #88c999; opacity: 0.8;'>Letterboxd review: 4.5 stars. Beautiful cinematography, but the nectar tasted terrible.</span>",
                choices: []
            }
        };

        const textContainer = document.getElementById('text-container');
        const choicesContainer = document.getElementById('choices-container');
        const audioPrompt = document.getElementById('audio-prompt');

        function renderNode(nodeId) {
            initAudio(); 
            if(audioPrompt) audioPrompt.style.display = 'none';

            const node = story[nodeId];
            
            textContainer.classList.remove('fade-in');
            textContainer.classList.add('fade-out');
            choicesContainer.innerHTML = '';

            setTimeout(() => {
                textContainer.innerHTML = node.text;
                textContainer.classList.remove('fade-out');
                textContainer.classList.add('fade-in');

                node.choices.forEach(choice => {
                    if (choice.condition && !choice.condition()) return;
                    
                    const btn = document.createElement('button');
                    btn.innerText = choice.text;
                    btn.onclick = () => {
                        if (choice.action) choice.action();
                        renderNode(choice.target);
                    };
                    choicesContainer.appendChild(btn);
                });
            }, 1000); 
        }

        textContainer.innerHTML = story.start.text;
        const startBtn = document.createElement('button');
        startBtn.innerText = story.start.choices[0].text;
        startBtn.onclick = () => renderNode('adrift');
        choicesContainer.appendChild(startBtn);

    </script>
</body>
</html>
