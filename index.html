<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Understory</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap');

        :root {
            --bg-dark: #030a06;
            --text-main: #e8f4ec;
            --text-muted: #8ca394;
            --accent: #a3d9b4;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Organic film grain overlay */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        #bg-glow {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 110%, rgba(18, 54, 34, 0.6) 0%, rgba(3, 10, 6, 1) 80%);
            z-index: 0;
            transition: background 0.3s ease;
        }

        #spores-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .spore {
            position: absolute;
            background: rgba(163, 217, 180, 0.4);
            border-radius: 50%;
            filter: blur(2px);
            animation: float-up linear infinite, pulse ease-in-out infinite alternate;
        }

        @keyframes float-up {
            0% { transform: translateY(110vh) translateX(0); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
        }

        @keyframes pulse {
            0% { transform: scale(0.8); }
            100% { transform: scale(1.4); }
        }

        #reader-pane {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 85%;
            padding: 40px;
        }

        #audio-prompt {
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 50px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: breathe 4s infinite alternate;
        }

        @keyframes breathe {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        #text-container {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 50px;
            min-height: 180px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        #text-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #choices-container.visible {
            opacity: 1;
        }

        button {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(140, 163, 148, 0.2);
            padding: 14px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            color: var(--text-main);
            border-color: var(--accent);
            background: rgba(163, 217, 180, 0.05);
            transform: translateX(5px);
        }

        em {
            color: var(--accent);
            font-style: italic;
        }

    </style>
</head>
<body>

    <div class="noise"></div>
    <div id="bg-glow"></div>
    <div id="spores-container"></div>

    <div id="reader-pane">
        <div id="audio-prompt">Put your headphones on.</div>
        <div id="text-container"></div>
        <div id="choices-container"></div>
    </div>

    <script>
        // --- AMBIENT SOUNDSCAPE ENGINE ---
        // Generates an evolving, algorithmic ambient track in the browser
        let audioCtx;
        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(audioCtx.destination);
            masterGain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 5);

            // 1. Gentle Wind/Breathing (Filtered Noise)
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;

            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.value = 400;

            const noiseLFO = audioCtx.createOscillator();
            noiseLFO.frequency.value = 0.05; // Very slow breathing
            const noiseLFOGain = audioCtx.createGain();
            noiseLFOGain.gain.value = 200;
            noiseLFO.connect(noiseLFOGain);
            noiseLFOGain.connect(noiseFilter.frequency);

            const noiseVolume = audioCtx.createGain();
            noiseVolume.gain.value = 0.05;

            noise.connect(noiseFilter);
            noiseFilter.connect(noiseVolume);
            noiseVolume.connect(masterGain);
            noise.start();
            noiseLFO.start();

            // 2. Swelling Background Chords
            const createDrone = (freq, rate) => {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                
                const lfo = audioCtx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = rate;
                
                const gain = audioCtx.createGain();
                gain.gain.value = 0;
                
                lfo.connect(gain.gain);
                osc.connect(gain);
                gain.connect(masterGain);
                
                osc.start();
                lfo.start();
            };
            createDrone(130.81, 0.03); // C3
            createDrone(196.00, 0.04); // G3
            createDrone(220.00, 0.02); // A3

            // 3. Generative Pentatonic Chimes
            const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // C4, D4, E4, G4, A4, C5
            
            function playChime() {
                if (Math.random() > 0.6) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'triangle';
                    // Pick a random note from the scale
                    osc.frequency.value = scale[Math.floor(Math.random() * scale.length)];
                    
                    // Pluck envelope
                    gain.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4);
                    
                    osc.connect(gain);
                    gain.connect(masterGain);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 4);
                }
                // Schedule next chime randomly between 1 and 4 seconds
                setTimeout(playChime, 1000 + Math.random() * 3000);
            }
            playChime();
        }

        // --- VISUAL SPORES ---
        function createSpores() {
            const container = document.getElementById('spores-container');
            for (let i = 0; i < 35; i++) {
                const spore = document.createElement('div');
                spore.classList.add('spore');
                const size = Math.random() * 2.5 + 1;
                spore.style.width = `${size}px`;
                spore.style.height = `${size}px`;
                spore.style.left = `${Math.random() * 100}vw`;
                spore.style.animationDuration = `${Math.random() * 25 + 15}s, ${Math.random() * 3 + 2}s`;
                spore.style.animationDelay = `${Math.random() * -30}s, 0s`;
                container.appendChild(spore);
            }
        }
        createSpores();

        // --- STORY ENGINE ---
        let state = { helpedMoth: false, healedFlytrap: false, metBeetle: false };

        const story = {
            start: {
                text: "You’ve been at the desk for eleven hours. It’s a habit. The speeding minor last month was supposed to be a sign to slow down, but here you are, engineering a lab setup that would make Kevin McCloud from <em>Grand Designs</em> weep. Your copy of <em>The Atlas Six</em> is buried under notes. You lean over the primary sample. You slip. The floor vanishes.",
                choices: [
                    { text: "Brace for impact.", target: "adrift" }
                ]
            },
            adrift: {
                text: "When you open your eyes, you are exactly four millimetres tall. You are floating on a piece of fibrous debris in a massive puddle of nectar. It’s very <em>Life of Pi</em>, except the imminent threat isn't a tiger, it's being digested by a pitcher plant.",
                choices: [
                    { text: "Paddle to the solid edge.", target: "edge" }
                ]
            },
            edge: {
                text: "You pull yourself onto the waxy green rim. Bioluminescent spores drift through the air like snow. The towering silhouettes of carnivorous plants loom above you. From where you stand, you can hear a frantic fluttering to your left. Straight ahead, the path is blocked by wilted leaves. To your right, there is a rhythmic, stubborn tapping.",
                choices: [
                    { text: "Walk toward the fluttering sound.", target: "moth", condition: () => !state.helpedMoth },
                    { text: "Look at the blocked path.", target: "flytrap", condition: () => !state.healedFlytrap },
                    { text: "See who's tapping.", target: "beetle", condition: () => !state.metBeetle },
                    { text: "Look up at the sheer drop of the stool leg.", target: "climax", condition: () => state.helpedMoth || state.healedFlytrap || state.metBeetle }
                ]
            },
            moth: {
                text: "It’s a moth. A very pathetic-looking moth with a badly torn wing. It's grounded. This isn't exactly your usual field, but you’ve been reading up on prosthetics lately. You might as well.",
                choices: [
                    { text: "Splint the wing with dried fibers.", target: "moth_help" }
                ]
            },
            moth_help: {
                text: "You piece together a delicate, highly functional brace. The moth flexes it, hovers, and gives you a look of deep, insectoid gratitude. It nudges something toward your boots. It’s a Percy Pig. Where did a moth get a Percy Pig? Don't ask.",
                choices: [
                    { text: "Pocket the gummy and head back.", target: "edge", action: () => state.helpedMoth = true }
                ]
            },
            flytrap: {
                text: "The path is blocked by a Venus flytrap that looks terrible. The tissue around its hinges is swollen and discolored. It's a textbook bacterial bloom. You sigh, slipping effortlessly into microbiology mode.",
                choices: [
                    { text: "Neutralize the infection.", target: "flytrap_help" }
                ]
            },
            flytrap_help: {
                text: "You synthesize a quick alkaline drop from some nearby moss and apply it to the hinges. The flytrap shudders, the swelling recedes, and the massive jaws slowly open, clearing the central path.",
                choices: [
                    { text: "Give the leaf a pat and head back.", target: "edge", action: () => state.healedFlytrap = true }
                ]
            },
            beetle: {
                text: "There is a rhinoceros beetle sitting on a pebble. It is wearing a tiny, makeshift cape made of red and white fabric. You squint. It's definitely a scrap of an Arsenal scarf. The beetle isn't doing anything, just sitting there, radiating pure Lego Batman energy.",
                choices: [
                    { text: "Nod respectfully.", target: "beetle_help" }
                ]
            },
            beetle_help: {
                text: "The beetle nods back. An unspoken, deeply serious bond of respect has been formed. He stands guard. He is ready.",
                choices: [
                    { text: "Leave him to his watch.", target: "edge", action: () => state.metBeetle = true }
                ]
            },
            climax: {
                text: "You get to the base of the metal stool leg. It stretches up into the darkness like a skyscraper. The polished steel is too sheer to climb. You run the physics in your head. It’s impossible. The heavy quiet of the lab settles over you.",
                choices: [
                    { text: "Try to find another way around.", target: "climax_resolve" }
                ]
            },
            climax_resolve: {
                text: "Before you can turn around, there's a shift in the air. A shadow drops down—it's the moth, hovering steadily on its new wing. The beetle marches out of the undergrowth to brace your boots. From above, the healed flytrap lowers a thick, sturdy vine. You spend so much of your life making sure everyone else doesn't fall apart. It's nice, just this once, to let them carry you.",
                choices: [
                    { text: "Hold on.", target: "ending" }
                ]
            },
            ending: {
                text: "You are pulled up through the glowing air, past the edge of the desk, back to where you belong.<br><br><br><span style='font-family: Inter, sans-serif; font-size: 0.85rem; color: var(--text-muted); opacity: 0.7; letter-spacing: 0.05em;'>Letterboxd review: 4.5 stars. Great character arcs, but the nectar tasted like battery acid.</span>",
                choices: []
            }
        };

        const textContainer = document.getElementById('text-container');
        const choicesContainer = document.getElementById('choices-container');
        const audioPrompt = document.getElementById('audio-prompt');

        function renderNode(nodeId) {
            initAudio(); 
            if(audioPrompt) audioPrompt.style.display = 'none';

            const node = story[nodeId];
            
            textContainer.classList.remove('visible');
            choicesContainer.classList.remove('visible');

            setTimeout(() => {
                textContainer.innerHTML = node.text;
                choicesContainer.innerHTML = '';

                node.choices.forEach(choice => {
                    if (choice.condition && !choice.condition()) return;
                    
                    const btn = document.createElement('button');
                    btn.innerText = choice.text;
                    btn.onclick = () => {
                        if (choice.action) choice.action();
                        renderNode(choice.target);
                    };
                    choicesContainer.appendChild(btn);
                });

                textContainer.classList.add('visible');
                
                // Delay the choices slightly so she reads the text first
                setTimeout(() => {
                    choicesContainer.classList.add('visible');
                }, 1200);

            }, 800); 
        }

        // Init
        textContainer.innerHTML = story.start.text;
        textContainer.classList.add('visible');
        
        const startBtn = document.createElement('button');
        startBtn.innerText = story.start.choices[0].text;
        startBtn.onclick = () => renderNode('adrift');
        choicesContainer.appendChild(startBtn);
        
        setTimeout(() => {
            choicesContainer.classList.add('visible');
        }, 800);

        // Subtle mouse tracking for the background gradient
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.getElementById('bg-glow').style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(18, 54, 34, 0.6) 0%, rgba(3, 10, 6, 1) 90%)`;
        });

    </script>
</body>
</html>
